[cfg]
base = "docs/"
language = "zh"
keyword_length = "3"
summary_length = "150"
similarity_threshold = "0.70"
intra_batch_threshold = "0.60"

; Hot market trigger: ETF daily move >= this threshold (absolute value)
hot_market_threshold = "0.02"

; Max news articles per section per run
market_news_max_items = "5"
japan_news_max_items = "3"
hot_market_news_max_items = "2"

[indices]
; Global indices tracked via yfinance
tickers = "^GSPC,^IXIC,^DJI,^N225,^HSI"
labels  = "S&P 500,NASDAQ,Dow Jones,Nikkei 225,Hang Seng"

[commodities]
; Commodities + FX tracked via yfinance
tickers = "GC=F,SI=F,CL=F,BZ=F"
labels  = "Gold,Silver,WTI Oil,Brent Oil"

[fx]
; Foreign exchange pairs
tickers = "USDJPY=X,CNYJPY=X,EURJPY=X"
labels  = "USD/JPY,CNY/JPY,EUR/JPY"

[hot_markets]
; Emerging market ETFs screened for large daily moves
etfs   = "INDA,EWZ,VNM,EWY,KSA,EWT,EWW,EIDO"
labels = "India,Brazil,Vietnam,S.Korea,Saudi Arabia,Taiwan,Mexico,Indonesia"

[market_news]
name = "market_news"
url  = "https://finance.yahoo.com/rss/topstories,https://www.cnbc.com/id/100003114/device/rss/rss.html,https://feeds.content.dowjones.io/public/rss/mw_topstories"

[japan_news]
name = "japan_news"
url  = "https://www3.nhk.or.jp/rss/news/cat5.xml"
