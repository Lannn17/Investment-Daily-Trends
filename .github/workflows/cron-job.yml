name: investment_daily

on:
  schedule:
    # Morning: 07:30 JST = 22:30 UTC (previous day)
    - cron: '30 22 * * *'
    # Evening: 22:00 JST = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets presence
        run: |
          echo "SMTP_HOST set: ${{ secrets.SMTP_HOST != '' }}"
          echo "SMTP_PORT set: ${{ secrets.SMTP_PORT != '' }}"
          echo "SMTP_USER set: ${{ secrets.SMTP_USER != '' }}"
          echo "SMTP_PASS set: ${{ secrets.SMTP_PASS != '' }}"
          echo "RECIPIENT_EMAIL set: ${{ secrets.RECIPIENT_EMAIL != '' }}"

      - name: Run Investment Daily Trends
        run: python main.py
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:      ${{ secrets.GEMINI_MODEL }}
          SCORE_MODEL:       ${{ secrets.SCORE_MODEL }}
          TRANSLATE_MODEL:   ${{ secrets.TRANSLATE_MODEL }}
          SUMMARY_MODEL:     ${{ secrets.SUMMARY_MODEL }}
          WATCHLIST_MODEL:   ${{ secrets.WATCHLIST_MODEL }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}

      - name: Save generated files back to repo
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/ || true
          git diff --cached --quiet || git commit -m "chore: update docs [skip ci]"
          git push
